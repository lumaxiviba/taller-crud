<div class="modal-content p-4 bg-white rounded shadow">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">{{ modo === 'crear' ? 'Agregar' : 'Editar' }} Vehículo</h3>
    <button type="button" class="btn-close" aria-label="Cerrar" (click)="cancelar()"></button>
  </div>

  <form (ngSubmit)="guardar()" #form="ngForm">
    <div class="mb-3">
      <label class="form-label fw-bold">Marca</label>
      <select class="form-select" [(ngModel)]="autoForm.idMarca" name="idMarca" required>
        <option value="0" disabled>Seleccione una marca</option>
        @for (m of marcas; track m.id) {
          <option [value]="m.id">{{ m.descripcion }}</option>
        }
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Placa</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="autoForm.placa"
        name="placa"
        required
        placeholder="Ej: ABC-123"
      />
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Modelo</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="autoForm.modelo"
        name="modelo"
        required
      />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label fw-bold">Color</label>
        <input type="text" class="form-control" [(ngModel)]="autoForm.color" name="color" />
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label fw-bold">Año</label>
        <input type="number" class="form-control" [(ngModel)]="autoForm.anio" name="anio" />
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-3">
      <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn btn-success" [disabled]="form.invalid">Guardar</button>
    </div>
  </form>
</div>
